<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Embedded JavaScript Example</title>\n</head>\n<body>\n    <h1>Welcome to the Interactive Page</h1>\n    <button onclick=\"showJoke()\">Get Random Joke</button>\n    <div id=\"joke\"></div>\n    <div id=\"modal\" style=\"display:none;\">\n        <div style=\"background: white; padding: 20px;\">\n            <span onclick=\"closeModal()\" style=\"cursor: pointer;\">X</span>\n            <p id=\"modalContent\"></p>\n        </div>\n    </div>\n    <h2>BMI Calculator</h2>\n    <input type=\"number\" id=\"weight\" placeholder=\"Weight in kg\">\n    <input type=\"number\" id=\"height\" placeholder=\"Height in meters\">\n    <button onclick=\"calculateBMI()\">Calculate BMI</button>\n    <p id=\"bmiResult\"></p>\n    <script>\n        function showJoke() {\n            fetch(\"https://api.jokeapi.dev/joke/Any\")\n            .then(response => response.json())\n            .then(data => {\n                const jokeDiv = document.getElementById('joke');\n                if (data.joke) {\n                    jokeDiv.innerHTML = data.joke;\n                } else {\n                    jokeDiv.innerHTML = data.setup + ' ' + data.delivery;\n                }\n                openModal(data.joke);\n            });\n        }\n        function openModal(content) {\n            document.getElementById('modalContent').innerText = content;\n            document.getElementById('modal').style.display = 'block';\n        }\n        function closeModal() {\n            document.getElementById('modal').style.display = 'none';\n        }\n        function calculateBMI() {\n            const weight = parseFloat(document.getElementById('weight').value);\n            const height = parseFloat(document.getElementById('height').value);\n            if (weight && height) {\n                const bmi = (weight / (height * height)).toFixed(2);\n                document.getElementById('bmiResult').innerText = 'Your BMI is ' + bmi;\n            } else {\n                document.getElementById('bmiResult').innerText = 'Please enter valid weight and height.';\n            }\n        }\n    <\/script>\n</body>\n</html>\n

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Elite Fitness</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#training-programs">Training Programs</a></li>
                <li><a href="#bmi-calculator">BMI Calculator</a></li>
                <li><a href="#joke-generator">Random Joke</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="introduction">
            <h1>Welcome to Elite Fitness</h1>
            <p>Your journey to a healthier lifestyle starts here!</p>
        </section>

        <section id="training-programs">
            <h2>Training Programs</h2>
            <p>Explore our range of personalized training programs.</p>
            <div id="programs-list">
                <!-- Training programs will be dynamically populated here -->
            </div>
        </section>

        <section id="bmi-calculator">
            <h2>BMI Calculator</h2>
            <form id="bmi-form">
                <input type="number" id="weight" placeholder="Weight (kg)" required>
                <input type="number" id="height" placeholder="Height (m)" required>
                <button type="submit">Calculate BMI</button>
            </form>
            <div id="bmi-result"></div>
        </section>

        <section id="joke-generator">
            <h2>Random Joke Generator</h2>
            <button id="joke-btn">Get a Joke</button>
            <div id="joke"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 Elite Fitness. All rights reserved.</p>
    </footer>

    <script>
        // JavaScript for BMI Calculation
        document.getElementById('bmi-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const bmi = (weight / (height * height)).toFixed(2);
            document.getElementById('bmi-result').innerText = `Your BMI is ${bmi}`;
        });

        // JavaScript for Random Joke Generator
        document.getElementById('joke-btn').addEventListener('click', function() {
            fetch('https://official-joke-api.appspot.com/random_joke')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('joke').innerText = `${data.setup} - ${data.punchline}`;
                });
        });
    </script>
</body>
</html>
